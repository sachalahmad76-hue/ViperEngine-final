name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and Fix Folder Structure
        run: |
          unzip -o app.zip
          rm app.zip
          # If files are buried inside a sub-folder, pull them out to the root
          if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
            echo "Files not found in root. Searching in subfolders..."
            SUBFOLDER=$(find . -maxdepth 2 -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
            if [ ! -z "$SUBFOLDER" ] && [ "$SUBFOLDER" != "." ]; then
              echo "Moving files out of $SUBFOLDER..."
              mv $SUBFOLDER/* . 2>/dev/null || true
              mv $SUBFOLDER/.* . 2>/dev/null || true
            fi
          fi

      - name: Make Gradle executable
        run: |
          chmod +x gradlew || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Build with Gradle
        run: ./gradlew assembleDebug || gradle assembleDebug

       Silber Artifact Save
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ViperEngine-APK
          path: |
            **/build/outputs/apk/debug/*.apk
            **/*.apk
