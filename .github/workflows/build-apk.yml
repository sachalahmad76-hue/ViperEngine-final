name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Unpacks the zip file you just uploaded
      - name: Unzip project files
        run: |
          unzip -o app.zip
          rm app.zip

      # Makes sure the compilation scripts are allowed to run
      - name: Make Gradle executable
        run: |
          chmod +x gradlew || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      # Compiles your project files into the final app
      - name: Build with Gradle
        run: ./gradlew assembleDebug || gradle assembleDebug

      # Saves the created APK file for download
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ViperEngine-APK
          path: |
            **/build/outputs/apk/debug/*.apk
            **/*.apk
            
